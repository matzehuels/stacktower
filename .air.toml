# Air configuration for Go hot-reloading
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
# Build command
cmd = "go build -o ./tmp/stacktowerd ./cmd/stacktowerd"
# Binary to run
bin = "./tmp/stacktowerd"
# Additional arguments to pass to binary
args_bin = []
# Watch these extensions
include_ext = ["go", "tpl", "tmpl", "html"]
# Exclude these directories
exclude_dir = ["tmp", "vendor", "frontend", "node_modules", "output", ".git"]
# Exclude files matching these patterns
exclude_file = []
# Exclude unchanged files
exclude_unchanged = true
# Follow symlinks
follow_symlink = false
# Log file location
log = "tmp/air.log"
# Poll for changes (use when inotify doesn't work, e.g., Docker on macOS)
poll = false
# Poll interval in milliseconds
poll_interval = 500
# Delay before rebuild (ms) - debounce rapid saves
delay = 500
# Stop running old binary before building new one
stop_on_error = true
# Send interrupt signal before killing process
send_interrupt = true
# Delay before sending kill signal (ms)
kill_delay = 500

[log]
# Show log time
time = false
# Only show main log
main_only = false

[color]
# Customize colors
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Delete tmp directory on exit
clean_on_exit = true

