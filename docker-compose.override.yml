# Development overrides - automatically merged with docker-compose.yml
# This file enables hot-reload for frontend and faster rebuilds
#
# Usage:
#   docker compose up -d              # Uses this automatically
#   docker compose up -d --build      # Rebuild after dependency changes
#
# For production builds without this file:
#   docker compose -f docker-compose.yml up -d

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:5173"  # Using 3001 to avoid port conflicts
    volumes:
      # Mount source for hot-reload (but not node_modules)
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
    environment:
      VITE_API_URL: "http://localhost:8080"

  api:
    # For backend, we still build but cache better
    volumes:
      # Mount go source for development (requires rebuild, but faster with cache)
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

  worker:
    volumes:
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build

volumes:
  go-mod-cache:
  go-build-cache:

