# Stacktower - Docker Compose (Development with Hot Reload)
#
# Quick Start:
#   make dev          # Start everything
#   make dev-logs     # View logs
#   make dev-down     # Stop
#   make dev-wipe     # Wipe everything
#
# URLs:
#   - Frontend:        http://localhost:3000
#   - API:             http://localhost:8080
#   - MongoDB UI:      http://localhost:8081
#   - Redis UI:        http://localhost:8082

services:
  # ==========================================================================
  # Frontend (Vite dev server with HMR)
  # ==========================================================================

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json:ro
      - ./frontend/public:/app/public:ro
    environment:
      VITE_API_URL: "http://api:8080"
    depends_on:
      - api
    restart: unless-stopped

  # ==========================================================================
  # Backend API (Air hot-reload)
  # ==========================================================================

  api:
    build:
      context: .
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      STACKTOWER_MODE: "compose"
      STACKTOWER_HOST: "0.0.0.0"
      STACKTOWER_PORT: "8080"
      STACKTOWER_REDIS_ADDR: "redis:6379"
      STACKTOWER_MONGODB_URI: "mongodb://mongodb:27017"
      STACKTOWER_MONGODB_DATABASE: "stacktower"
      FRONTEND_URL: "http://localhost:3000"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      GITHUB_REDIRECT_URI: "http://localhost:8080/api/v1/auth/github/callback"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================================
  # Worker (Air hot-reload)
  # ==========================================================================

  worker:
    build:
      context: .
      target: dev
    command: ["air", "-c", ".air.toml", "--", "--worker", "--concurrency", "4"]
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      STACKTOWER_MODE: "compose"
      STACKTOWER_REDIS_ADDR: "redis:6379"
      STACKTOWER_MONGODB_URI: "mongodb://mongodb:27017"
      STACKTOWER_MONGODB_DATABASE: "stacktower"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================================================
  # Infrastructure
  # ==========================================================================

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: stacktower
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ==========================================================================
  # Admin UIs
  # ==========================================================================

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://mongodb:27017"
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    platform: linux/amd64
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  mongodb_data:
  go_mod_cache:
  go_build_cache:

networks:
  default:
    name: stacktower
